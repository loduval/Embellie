<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Mon Petit Jardin</title>
<meta name="theme-color" content="#cdb8e6">
<meta name="description" content="Un petit jardin d'outils tendres pour se détendre, se concentrer et apprivoiser ses émotions.">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mon Jardin">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap');

:root{
  --lav:#cdb8e6; --lav-d:#a98fd0; --blue:#bfe0ee; --blue-d:#7fc0da;
  --rose:#f4c3d6; --rose-d:#e899b6; --peach:#f8d8c2; --mint:#bfe6cf; --gold:#ffd98a;
  --ink:#48426b; --ink-soft:#7a749c; --paper:#fffafc;
  --shadow:0 14px 38px rgba(120,96,170,.20);
  --shadow-sm:0 6px 18px rgba(120,96,170,.16);
  --disp:'Fredoka','Baloo 2',system-ui,sans-serif;
  --body:'Nunito',system-ui,-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--body); color:var(--ink);
  background:
    radial-gradient(1100px 600px at 18% -10%, #e7dcf7 0%, transparent 60%),
    radial-gradient(900px 600px at 100% 0%, #d6eef6 0%, transparent 55%),
    radial-gradient(1000px 700px at 50% 120%, #fbe2d3 0%, transparent 60%),
    linear-gradient(160deg,#efe6fb 0%,#e4eef9 48%,#fdeee3 100%);
  background-attachment:fixed; min-height:100dvh; overflow-x:hidden;
  -webkit-user-select:none; user-select:none;
}
.blob{position:fixed;border-radius:50%;filter:blur(8px);opacity:.40;z-index:0;pointer-events:none;animation:float 16s ease-in-out infinite}
.blob.b1{width:160px;height:160px;background:var(--rose);top:8%;left:-40px}
.blob.b2{width:120px;height:120px;background:var(--blue);top:62%;right:-30px;animation-delay:-5s}
.blob.b3{width:90px;height:90px;background:var(--gold);top:36%;left:78%;animation-delay:-9s}
@keyframes float{0%,100%{transform:translateY(0) translateX(0)}50%{transform:translateY(-26px) translateX(12px)}}

.wrap{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:max(18px,env(safe-area-inset-top)) 16px 28px}
#home{animation:fade .5s ease}
.hello{font-family:var(--disp);font-weight:600;font-size:clamp(28px,7vw,40px);text-align:center;margin-top:14px;color:var(--ink)}
.hello .wave{display:inline-block;animation:wave 2.4s ease-in-out infinite;transform-origin:70% 80%}
@keyframes wave{0%,60%,100%{transform:rotate(0)}10%{transform:rotate(16deg)}20%{transform:rotate(-8deg)}30%{transform:rotate(14deg)}40%{transform:rotate(-4deg)}}
.tag{text-align:center;color:var(--ink-soft);font-size:15px;margin:6px 0 22px;font-weight:600}
.section-h{font-family:var(--disp);font-weight:500;font-size:18px;color:var(--ink);margin:22px 6px 12px;display:flex;align-items:center;gap:9px}
.section-h::after{content:"";flex:1;height:2px;border-radius:2px;background:linear-gradient(90deg,rgba(169,143,208,.45),transparent)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px}
.tile{position:relative;border:none;cursor:pointer;text-align:left;color:var(--ink);background:rgba(255,255,255,.78);backdrop-filter:blur(8px);
  border-radius:24px;padding:18px 16px 16px;box-shadow:var(--shadow-sm);transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s;overflow:hidden;font-family:var(--body)}
.tile:active{transform:scale(.95)}
.tile::before{content:"";position:absolute;inset:0 0 auto 0;height:6px;background:var(--tc,var(--lav))}
.tile .em{font-size:34px;display:block;margin-bottom:8px;filter:drop-shadow(0 3px 5px rgba(120,96,170,.18))}
.tile .ti{display:block;font-family:var(--disp);font-weight:500;font-size:16.5px;line-height:1.15}
.tile .su{display:block;font-size:11.5px;color:var(--ink-soft);margin-top:4px;font-weight:600}
.parents-link{display:block;margin:30px auto 6px;background:rgba(255,255,255,.6);border:1.5px solid rgba(169,143,208,.3);
  color:var(--ink-soft);font-family:var(--body);font-weight:700;font-size:13.5px;padding:11px 18px;border-radius:16px;cursor:pointer}
.parents-link:active{transform:scale(.97)}
.footnote{text-align:center;color:var(--ink-soft);font-size:11px;margin-top:14px;opacity:.8;line-height:1.5}

#stage{display:none;position:fixed;inset:0;z-index:20;background:inherit;flex-direction:column}
#stage.on{display:flex}
.topbar{display:flex;align-items:center;gap:12px;padding:max(12px,env(safe-area-inset-top)) 16px 10px;flex:0 0 auto}
.back{border:none;background:rgba(255,255,255,.82);width:46px;height:46px;min-width:46px;border-radius:16px;font-size:22px;cursor:pointer;box-shadow:var(--shadow-sm);color:var(--ink)}
.back:active{transform:scale(.92)}
.gtitle{font-family:var(--disp);font-weight:500;font-size:19px}
.groot{flex:1 1 auto;position:relative;overflow:hidden;padding:0 14px 18px}
.gpad{height:100%;display:flex;flex-direction:column}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.18)}100%{transform:scale(1);opacity:1}}

.btn{font-family:var(--disp);font-weight:500;border:none;cursor:pointer;border-radius:18px;padding:13px 22px;font-size:16px;background:var(--lav);color:#fff;box-shadow:var(--shadow-sm)}
.btn:active{transform:scale(.96)}
.btn.ghost{background:rgba(255,255,255,.8);color:var(--ink)}
.btn.rose{background:var(--rose-d)} .btn.blue{background:var(--blue-d)} .btn.mint{background:#84cda4}
.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;height:100%;gap:16px}
.pips{display:flex;gap:7px;justify-content:center;margin:4px 0;flex-wrap:wrap}
.pip{width:12px;height:12px;border-radius:50%;background:rgba(169,143,208,.28);transition:all .3s}
.pip.on{background:var(--lav-d);transform:scale(1.18)}
.softcard{background:rgba(255,255,255,.86);border-radius:22px;padding:18px;box-shadow:var(--shadow-sm)}

.cele{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  background:rgba(255,250,252,.92);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .5s;padding:24px;gap:14px;z-index:5}
.cele.show{opacity:1;pointer-events:auto}
.cele .big{font-size:64px;animation:pop .6s ease}
.cele .msg{font-family:var(--disp);font-weight:500;font-size:21px;max-width:340px;line-height:1.35}

#parents{position:fixed;inset:0;z-index:40;background:rgba(72,66,107,.45);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
#parents.on{display:flex}
.sheet{background:var(--paper);width:100%;max-width:680px;max-height:88vh;overflow-y:auto;border-radius:26px 26px 0 0;padding:24px 22px max(26px,env(safe-area-inset-bottom));box-shadow:0 -10px 40px rgba(72,66,107,.3);animation:up .35s ease}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.sheet h2{font-family:var(--disp);font-weight:600;font-size:23px;margin-bottom:4px}
.sheet .lede{color:var(--ink-soft);font-size:14px;margin-bottom:18px;line-height:1.6}
.pcard{border-left:4px solid var(--lav);background:rgba(205,184,230,.1);border-radius:0 14px 14px 0;padding:12px 15px;margin-bottom:12px}
.pcard h4{font-family:var(--disp);font-weight:500;font-size:16px;margin-bottom:4px}
.pcard p{font-size:13.5px;line-height:1.55;color:#5a557a;margin-bottom:5px}
.pcard .sci{font-size:12px;color:var(--ink-soft);font-style:italic}
.disclaimer{font-size:12.5px;color:var(--ink-soft);line-height:1.6;background:rgba(191,224,238,.25);border-radius:14px;padding:14px;margin-top:6px}
.closex{position:sticky;top:0;float:right;border:none;background:rgba(169,143,208,.18);width:38px;height:38px;border-radius:12px;font-size:18px;cursor:pointer;color:var(--ink)}

/* ---- JARDIN : forêt illustrée ---- */
.scene{position:absolute;inset:0;border-radius:18px;overflow:hidden;background:#cfeafb}
.scene .bg{position:absolute;inset:0;width:100%;height:100%;display:block}
.find{position:absolute;cursor:pointer;transform:translate(-50%,-50%) scale(.96);z-index:3;
  opacity:.2;filter:saturate(.25) brightness(1.05);
  transition:opacity .55s ease,filter .55s ease,transform .5s cubic-bezier(.34,1.56,.64,1)}
.find svg{width:100%;height:100%;display:block;overflow:visible}
.find.found{opacity:1;filter:drop-shadow(0 4px 6px rgba(60,90,60,.22));transform:translate(-50%,-50%) scale(1.06)}
.find:not(.found):active{transform:translate(-50%,-50%) scale(.86)}
.spark{position:absolute;font-size:24px;pointer-events:none;animation:sparkle .9s ease forwards;z-index:4}
@keyframes sparkle{0%{transform:scale(.3) translateY(0);opacity:1}100%{transform:scale(1.4) translateY(-30px);opacity:0}}

/* ---- RESPIRE : bulle bleue dense ---- */
.breath-halo{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(127,192,218,.28),transparent 70%);animation:halo 10s ease-in-out infinite}
@keyframes halo{0%,100%{transform:scale(.8);opacity:.5}50%{transform:scale(1.15);opacity:.9}}
.breath{position:relative;width:212px;height:212px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 36% 30%, #f0fbff 0%, #b6e0f6 30%, #6fb6e6 62%, #3f86c8 100%);
  box-shadow:0 18px 50px rgba(63,134,200,.55), inset 0 -16px 34px rgba(45,105,170,.55), inset 0 14px 26px rgba(255,255,255,.5);
  color:#fff;font-family:var(--disp);font-weight:500;font-size:24px;text-shadow:0 1px 4px rgba(40,90,150,.5);will-change:transform}

/* ---- BULLES pastel ---- */
.bubble{position:absolute;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,.85);box-shadow:0 4px 14px rgba(120,150,180,.22), inset 0 6px 12px rgba(255,255,255,.6);will-change:transform}
.bubble.pop{animation:bpop .35s ease forwards}
@keyframes bpop{to{transform:scale(1.5);opacity:0}}

/* ---- KALÉIDOSCOPE ---- */
#kaleo{width:100%;height:100%;border-radius:18px;display:block;background:#2a2440;touch-action:none;transition:transform .1s}
#kaleo.spin{animation:kspin 14s linear infinite}
@keyframes kspin{to{transform:rotate(360deg)}}

/* ---- MEMORY (paires) ---- */
.mboard{display:grid;gap:9px;width:100%;max-width:430px;margin:0 auto}
.mcard{aspect-ratio:1;cursor:pointer;background:transparent;border:none;padding:0;perspective:800px}
.mcard-inner{position:relative;width:100%;height:100%;transition:transform .4s cubic-bezier(.34,1.4,.6,1);transform-style:preserve-3d}
.mcard.flip .mcard-inner,.mcard.match .mcard-inner{transform:rotateY(180deg)}
.mface{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
.mfront{background:linear-gradient(145deg,var(--lav) 0%,var(--blue) 100%);color:#fff;font-size:30px}
.mback{background:#fff;transform:rotateY(180deg);font-size:min(10vw,42px)}
.mcard.match .mback{background:var(--mint);animation:pop .5s ease}

/* ---- ÉMOTIONS ---- */
.emo-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;align-content:center}
.emo{border:none;cursor:pointer;width:104px;padding:16px 8px;border-radius:22px;background:rgba(255,255,255,.85);box-shadow:var(--shadow-sm);display:flex;flex-direction:column;align-items:center;gap:6px;transition:transform .15s;font-family:var(--body)}
.emo:active{transform:scale(.94)}
.emo .e{font-size:40px} .emo .w{font-family:var(--disp);font-weight:500;font-size:14px;color:var(--ink)}
.yest{background:rgba(205,184,230,.18);border-radius:14px;padding:9px 14px;text-align:center;font-size:13px;font-weight:700;color:var(--ink-soft);margin-bottom:4px}

.field{width:100%;font-family:var(--body);font-size:16px;border:2px solid rgba(169,143,208,.3);border-radius:16px;padding:13px 15px;color:var(--ink);background:#fff;-webkit-user-select:text;user-select:text}
.field:focus{outline:none;border-color:var(--lav-d)}
.list{display:flex;flex-direction:column;gap:9px;overflow-y:auto;padding:2px}
.item{display:flex;align-items:center;gap:11px;background:rgba(255,255,255,.85);border-radius:16px;padding:12px 14px;box-shadow:var(--shadow-sm)}
.item .ie{font-size:24px} .item .it{flex:1;font-weight:700;font-size:14.5px} .item .id{font-size:11px;color:var(--ink-soft)}
.item .x{border:none;background:rgba(232,153,182,.18);color:var(--rose-d);width:30px;height:30px;border-radius:10px;cursor:pointer;font-size:15px}

.check{display:flex;align-items:center;gap:13px;background:rgba(255,255,255,.85);border-radius:16px;padding:13px 15px;box-shadow:var(--shadow-sm);cursor:pointer;transition:background .2s}
.check.done{background:rgba(191,230,207,.55)}
.check.ro{cursor:default;opacity:.92}
.check .box{width:28px;height:28px;min-width:28px;border-radius:9px;border:2.5px solid var(--lav-d);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;transition:background .2s}
.check.done .box{background:#84cda4;border-color:#84cda4}
.check .ce{font-size:22px} .check .cl{flex:1;font-weight:700;font-size:15px}
.check.done .cl{text-decoration:line-through;color:var(--ink-soft)}
.datenav{display:flex;align-items:center;justify-content:center;gap:14px;margin:2px 0 12px}
.datenav button{border:none;background:rgba(255,255,255,.8);width:40px;height:40px;border-radius:13px;font-size:18px;cursor:pointer;box-shadow:var(--shadow-sm);color:var(--ink)}
.datenav .dlabel{font-family:var(--disp);font-weight:500;font-size:16px;min-width:170px;text-align:center}

/* ---- BOÎTE À SOUCIS (SVG) ---- */
.soucisbox{width:252px;max-width:80vw;margin:0 auto;display:block}
.sb-lid{transform-box:fill-box;transform-origin:50% 92%;transition:transform .6s cubic-bezier(.5,0,.4,1)}
.sb-lid.open{transform:rotate(-22deg) translateY(-3px)}
.sb-note{transition:all .8s cubic-bezier(.5,0,.5,1)}
.sb-note.in{transform:translate(0,30px) scale(.14) rotate(150deg);opacity:0}
</style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
<div class="wrap"><div id="home"></div></div>
<div id="stage">
  <div class="topbar"><button class="back" id="backBtn" aria-label="Retour">←</button><div class="gtitle" id="gtitle"></div></div>
  <div class="groot" id="groot"></div>
</div>
<div id="parents"><div class="sheet" id="psheet"></div></div>

<script>
"use strict";
const CHILD_NAME = "Alicia";

function el(tag,props,...kids){
  const e=document.createElement(tag);
  if(props) for(const k in props){
    if(k==="class") e.className=props[k];
    else if(k==="html") e.innerHTML=props[k];
    else if(k.startsWith("on")&&typeof props[k]==="function") e.addEventListener(k.slice(2),props[k]);
    else if(k==="style"&&typeof props[k]==="object") Object.assign(e.style,props[k]);
    else e.setAttribute(k,props[k]);
  }
  for(const c of kids){ if(c==null) continue; e.append(c.nodeType?c:document.createTextNode(c)); }
  return e;
}
const rnd=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const dStr=d=>d.toISOString().slice(0,10);
const todayKey=()=>dStr(new Date());
const frDate=d=>d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
const store={get:(k,d)=>{try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v)}catch(e){return d}},
             set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}};

let cleanup=null;
const GAMES={};
function def(g){GAMES[g.id]=g;}
const KIND=[
 "Tu vois plein de choses que d'autres rateraient. C'est ta force.",
 "Quel bel œil tu as ! Bravo d'avoir tout trouvé.",
 "Tu y es arrivée, toute seule. Tu peux être fière.",
 "Tranquillement, à ton rythme : c'est parfait comme ça.",
 "Tu es douée pour repérer les petites choses. Garde ce talent.",
 "Joli ! Ton attention est un vrai super-pouvoir.",
 "Doucement et sûrement, tu as réussi. 💜"
];

/* ---------------- 1. JARDIN (scène + variété quotidienne) ---------------- */
def({id:"jardin",group:"matin",emoji:"🌳",tc:"var(--mint)",
  title:"Le jardin qui s'éveille",sub:"cherche et trouve",
  mount(root){
    const BG=`<svg class="bg" viewBox="0 0 300 460" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#bfe6f7"/><stop offset="0.55" stop-color="#dff1f7"/><stop offset="0.75" stop-color="#eaf6e6"/></linearGradient><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#cdeab0"/><stop offset="1" stop-color="#aee08e"/></linearGradient><linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a9dd86"/><stop offset="1" stop-color="#84cf6a"/></linearGradient><radialGradient id="sun" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#fff6c4"/><stop offset="0.6" stop-color="#ffe08a"/><stop offset="1" stop-color="#ffe08a" stop-opacity="0"/></radialGradient></defs><rect width="300" height="460" fill="url(#sky)"/><circle cx="238" cy="58" r="50" fill="url(#sun)"/><circle cx="238" cy="58" r="22" fill="#ffe7a0"/><g fill="#ffffff" opacity="0.9"><ellipse cx="70" cy="60" rx="34" ry="14"/><ellipse cx="92" cy="52" rx="22" ry="13"/><ellipse cx="50" cy="55" rx="18" ry="11"/><ellipse cx="205" cy="98" rx="26" ry="10"/><ellipse cx="220" cy="92" rx="16" ry="9"/></g><path d="M0 300 Q80 250 160 290 Q240 320 300 280 L300 460 L0 460Z" fill="#cfe9ad"/><path d="M0 330 Q90 290 180 322 Q250 345 300 320 L300 460 L0 460Z" fill="url(#g1)"/><g fill="#bfe09a"><circle cx="40" cy="300" r="20"/><circle cx="60" cy="296" r="16"/><circle cx="250" cy="312" r="18"/><circle cx="268" cy="308" r="14"/></g><g><rect x="84" y="300" width="9" height="40" rx="3" fill="#9a6b3f"/><circle cx="88" cy="296" r="30" fill="#7cc06a"/><circle cx="72" cy="306" r="20" fill="#8fce7c"/><circle cx="104" cy="306" r="20" fill="#8fce7c"/><circle cx="88" cy="282" r="20" fill="#9ad689"/><rect x="196" y="300" width="9" height="44" rx="3" fill="#9a6b3f"/><circle cx="200" cy="294" r="32" fill="#73b863"/><circle cx="182" cy="306" r="21" fill="#86c873"/><circle cx="220" cy="306" r= /* ---------------- 2. RESPIRE ---------------- */
def({id:"respire",group:"calme",emoji:"🎈",tc:"var(--blue)",
  title:"Respire avec moi",sub:"se calmer en douceur",
  mount(root){
    let raf=null,startT=0,dur=180;
    const halo=el("div",{class:"breath-halo"});
    const circle=el("div",{class:"breath"},"prête ?");
    const orb=el("div",{style:{position:"relative",display:"flex",alignItems:"center",justifyContent:"center",width:"300px",height:"300px"}},halo,circle);
    const sub=el("div",{style:{color:"var(--ink-soft)",fontWeight:700,fontSize:"14px",minHeight:"20px"}},"Suis le ballon : il gonfle, il dégonfle.");
    const choices=el("div",{class:"row"},...[["1 min",60],["3 min",180],["5 min",300]].map(([l,s])=>el("button",{class:"btn ghost",onclick:()=>start(s)},l)));
    const stopb=el("button",{class:"btn ghost",style:{display:"none"},onclick:stop},"Arrêter");
    const view=el("div",{class:"center"},orb,sub,choices,stopb);
    function start(s){dur=s;startT=performance.now();choices.style.display="none";stopb.style.display="";loop();}
    function loop(){
      const t=(performance.now()-startT)/1000; if(t>=dur){finish();return;}
      const ph=(t%10)/10; let scale,label;
      if(ph<0.5){const p=ph/0.5;scale=0.62+0.38*(1-Math.cos(Math.PI*p))/2;label="inspire…";}
      else{const p=(ph-0.5)/0.5;scale=1-0.38*(1-Math.cos(Math.PI*p))/2;label="expire…";}
      circle.style.transform="scale("+scale+")";circle.textContent=label;
      sub.textContent="encore "+Math.ceil(dur-t)+" s — tout doux"; raf=requestAnimationFrame(loop);
    }
    function finish(){cancelAnimationFrame(raf);circle.style.transform="scale(1)";circle.textContent="🌙";sub.textContent="Voilà. Ton corps est plus calme.";stopb.style.display="none";choices.style.display="";}
    function stop(){cancelAnimationFrame(raf);circle.style.transform="scale(1)";circle.textContent="🎈";sub.textContent="Quand tu veux.";stopb.style.display="none";choices.style.display="";}
    cleanup=()=>cancelAnimationFrame(raf); root.append(view);
  }});

/* ---------------- 3. BULLES pastel ---------------- */
def({id:"bulles",group:"calme",emoji:"🫧",tc:"var(--blue)",
  title:"Les bulles tranquilles",sub:"éclate, respire, recommence",
  mount(root){
    const field=el("div",{style:{position:"absolute",inset:0,overflow:"hidden",borderRadius:"18px",background:"linear-gradient(180deg,#d2ecf8,#e7f4fb)"}});
    root.append(el("div",{class:"gpad"},field));
    const cols=["#bfe0ee","#f4c3d6","#bfe6cf","#ffe2a8","#d8c7ee","#ffcdd6","#c7e9f0"];
    let alive=true, bubbles=[];
    function spawn(){
      if(!alive)return;
      if(bubbles.length<40){
        const size=rnd(40,84),x=rnd(3,93),col=pick(cols);
        const b=el("div",{class:"bubble"});
        b.style.width=b.style.height=size+"px";b.style.left=x+"%";b.style.bottom=(-size)+"px";
        b.style.background="radial-gradient(circle at 32% 27%, rgba(255,255,255,.95) 0%, rgba(255,255,255,.35) 32%, "+col+" 66%, "+col+" 100%)";
        const speed=rnd(6,12),sway=rnd(-30,30);
        b.style.transition="transform "+speed+"s linear, opacity .35s";
        field.append(b);bubbles.push(b);
        requestAnimationFrame(()=>{b.style.transform="translateY("+(-(field.clientHeight+size+40))+"px) translateX("+sway+"px)";});
        const rm=()=>{b.remove();bubbles=bubbles.filter(x=>x!==b);};
        b.addEventListener("pointerdown",e=>{e.preventDefault();b.classList.add("pop");setTimeout(rm,330);});
        setTimeout(()=>{if(b.isConnected&&!b.classList.contains("pop"))rm();},speed*1000+200);
      }
      setTimeout(spawn,rnd(260,560));
    }
    spawn();
    cleanup=()=>{alive=false;bubbles.forEach(b=>b.remove());bubbles=[];};
  }});

def({id:"kaleo",group:"calme",emoji:"🌀",tc:"var(--lav)",
  title:"Le kaléidoscope",sub:"dessine, puis admire",
  mount(root){
    const pad=el("div",{class:"gpad"});
    const cv=el("canvas",{id:"kaleo"});
    const stageW=el("div",{style:{flex:"1 1 auto",position:"relative"}},cv);
    const bar=el("div",{class:"row",style:{flex:"0 0 auto",padding:"10px 0 2px"}},
      el("button",{class:"btn ghost",onclick:clearC},"Effacer 🧹"),
      el("button",{class:"btn lav",onclick:finish},"J'ai fini ✨"));
    pad.append(stageW,bar); root.append(pad);
    const ctx=cv.getContext("2d");let hue=Math.random()*360,drawing=false,last=null,dpr=Math.min(2,window.devicePixelRatio||1),touched=false;
    function size(){const r=cv.parentElement.getBoundingClientRect();cv.width=r.width*dpr;cv.height=r.height*dpr;clearC();}
    function clearC(){cv.classList.remove("spin");touched=false;ctx.setTransform(1,0,0,1,0,0);ctx.fillStyle="#2a2440";ctx.fillRect(0,0,cv.width,cv.height);}
    function pt(ev){const r=cv.getBoundingClientRect();return{x:(ev.clientX-r.left)*dpr,y:(ev.clientY-r.top)*dpr};}
    function draw(p){
      touched=true;const cx=cv.width/2,cy=cv.height/2,n=6;hue=(hue+2)%360;
      ctx.strokeStyle="hsla("+hue+",70%,78%,.92)";ctx.lineWidth=5*dpr;ctx.lineCap="round";
      const a0=Math.atan2(last.y-cy,last.x-cx),r0=Math.hypot(last.x-cx,last.y-cy);
      const a1=Math.atan2(p.y-cy,p.x-cx),r1=Math.hypot(p.x-cx,p.y-cy);
      for(let k=0;k<n;k++){const rot=k*2*Math.PI/n;for(const m of[1,-1]){
        ctx.beginPath();ctx.moveTo(cx+r0*Math.cos(m*a0+rot),cy+r0*Math.sin(m*a0+rot));
        ctx.lineTo(cx+r1*Math.cos(m*a1+rot),cy+r1*Math.sin(m*a1+rot));ctx.stroke();}}
    }
    cv.addEventListener("pointerdown",e=>{e.preventDefault();drawing=true;last=pt(e);});
    cv.addEventListener("pointermove",e=>{if(!drawing)return;const p=pt(e);draw(p);last=p;});
    window.addEventListener("pointerup",()=>{drawing=false;});
    function finish(){
      if(!touched){const c=el("div",{class:"cele show"},el("div",{class:"big"},"🖍️"),el("div",{class:"msg"},"Dessine d'abord quelque chose, puis admire !"),el("button",{class:"btn ghost",onclick:e=>e.target.parentElement.remove()},"D'accord"));root.append(c);return;}
      cv.classList.add("spin");
      const cele=el("div",{class:"cele show",style:{background:"rgba(42,36,64,.55)"}},
        el("div",{class:"big"},"🌸"),
        el("div",{class:"msg",style:{color:"#fff"}},"Quel joli mandala tu as créé !"),
        el("div",{class:"row"},
          el("button",{class:"btn mint",onclick:()=>cele.remove()},"Je l'admire 😍"),
          el("button",{class:"btn ghost",onclick:()=>{cele.remove();clearC();}},"En faire un autre 🌀")));
      // petites étincelles
      for(let i=0;i<10;i++){const s=el("div",{class:"spark"});s.textContent=pick(["✨","💫","⭐"]);s.style.left=rnd(15,85)+"%";s.style.top=rnd(20,75)+"%";s.style.animationDelay=(i*0.08)+"s";stageW.append(s);setTimeout(()=>s.remove(),1300+i*80);}
      root.append(cele);
    }
    const ro=()=>size();window.addEventListener("resize",ro);setTimeout(size,30);
    cleanup=()=>window.removeEventListener("resize",ro);
  }});

def({id:"paires",group:"attention",emoji:"🃏",tc:"var(--mint)",
  title:"Le jeu des paires",sub:"retrouve les cartes pareilles",
  mount(root){
    const POOL=["🦊","🐸","🐰","🐯","🐨","🦁","🐼","🐷","🐵","🦄","🐢","🐙","🦋","🐝","🐬","🦜","🌻","🍓","🍉","🍄","⭐","🌙","🍀","🐞","🌈","🐶","🐱","🐧"];
    const LEVELS=[["Facile",3,"repeat(3,1fr)"],["Moyen",6,"repeat(4,1fr)"],["Avancé",8,"repeat(4,1fr)"]];
    const pad=el("div",{class:"gpad"}); root.append(pad);
    menu();
    function menu(){
      pad.innerHTML="";
      pad.append(el("div",{class:"center"},
        el("div",{class:"big",style:{fontSize:"54px"}},"🃏"),
        el("div",{style:{fontFamily:"var(--disp)",fontWeight:500,fontSize:"20px"}},"Choisis ton niveau"),
        el("div",{style:{color:"var(--ink-soft)",fontSize:"13px",maxWidth:"300px"}},"Retourne deux cartes : si elles sont pareilles, elles restent. Sinon, elles se retournent toutes seules. Pas de chrono, tout en douceur."),
        el("div",{class:"row"},...LEVELS.map((L,i)=>el("button",{class:"btn "+["mint","blue","rose"][i],onclick:()=>play(L[1],L[2])},L[0])))
      ));
    }
    function play(pairs,cols){
      pad.innerHTML="";
      const head=el("div",{style:{textAlign:"center",margin:"2px 0 10px",fontWeight:700,color:"var(--ink-soft)",fontSize:"13.5px"},id:"mhead"},"Trouve les "+pairs+" paires 🃏");
      const board=el("div",{class:"mboard"});board.style.gridTemplateColumns=cols;
      const wrap=el("div",{style:{flex:"1 1 auto",display:"flex",alignItems:"center",overflow:"auto"}},board);
      const foot=el("div",{class:"row",style:{flex:"0 0 auto",paddingTop:"8px"}},el("button",{class:"btn ghost",onclick:menu},"← Niveaux"));
      pad.append(head,wrap,foot);
      const vals=shuffle(POOL).slice(0,pairs);
      const deck=shuffle([...vals,...vals]);
      let first=null,lock=false,done=0;
      deck.forEach(v=>{
        const card=el("button",{class:"mcard"},
          el("div",{class:"mcard-inner"},
            el("div",{class:"mface mfront"},"🌸"),
            el("div",{class:"mface mback"},v)));
        card.dataset.v=v;
        card.addEventListener("click",()=>{
          if(lock||card.classList.contains("flip")||card.classList.contains("match"))return;
          card.classList.add("flip");
          if(!first){first=card;return;}
          if(first.dataset.v===card.dataset.v){
            first.classList.add("match");card.classList.add("match");first=null;done++;
            if(done===pairs)setTimeout(win,650);
          } else {
            lock=true;const a=first,b=card;first=null;
            setTimeout(()=>{a.classList.remove("flip");b.classList.remove("flip");lock=false;},1100);
          }
        });
        board.append(card);
      });
      function win(){
        const cele=el("div",{class:"cele show"},el("div",{class:"big"},"🎉"),
          el("div",{class:"msg"},pick(["Toutes les paires retrouvées ! Bravo 💜","Belle mémoire ! Tu as tout trouvé.","Quelle concentration ! Bravo."])),
          el("div",{class:"row"},el("button",{class:"btn mint",onclick:()=>play(pairs,cols)},"Rejouer 🔁"),el("button",{class:"btn ghost",onclick:menu},"Autre niveau")));
        pad.append(cele);
      }
    }
  }});

 ["🫧","Les bulles tranquilles","Geste sensori-moteur répétitif et sans enjeu, pour redescendre en pression. Bulles colorées pastel, nombreuses et bien visibles.","Auto-régulation sensorielle (effet apaisant des activités motrices répétitives type « fidget »)."],
 ["🌀","Le kaléidoscope","Création visuelle libre et symétrique ; le bouton « J'ai fini » transforme le tracé en mandala qui s'anime, pour donner une fin valorisante (pas seulement gribouiller).","Création de mandalas : réduction de l'anxiété documentée (Curry & Kasser, 2005)."],
 ["🃏","Le jeu des paires","Mémoire des paires, en 3 niveaux. À utiliser surtout au niveau facile : on entraîne en douceur la mémoire de travail, qui est son point fragile, mais sans chrono ni échec, pour que ce soit un entraînement progressif et réussi.","À doser : c'est le seul jeu qui sollicite la mémoire de travail. Commencer facile, augmenter seulement si elle y prend plaisir."],
 ["🎡","La roue des émotions","Mettre un mot sur ce qu'on ressent, puis un petit geste d'apaisement adapté. L'humeur du jour est enregistrée ; la veille est rappelée en haut.","« Affect labeling » : nommer une émotion réduit sa charge (Lieberman et al., 2007). L'auto-observation de l'humeur soutient la régulation émotionnelle."],
 ["⭐","Mes fiertés","Collectionner ses réussites, même minuscules, pour reconstruire l'estime de soi.","« Trois bonnes choses » (Seligman) ; activation comportementale par la maîtrise (TCC)."],
 ["✅","Ma journée","Visualiser et cocher le déroulé du jour ; les flèches permettent de revoir hier et les jours passés.","Emplois du temps visuels : réduisent l'anxiété, soutiennent les fonctions exécutives (supports visuels, TEACCH)."],
 ["🎁","Ma boîte à soucis","Au coucher, déposer un souci qui n'est ni gardé ni lu : le geste suffit à couper les ruminations.","Externalisation des inquiétudes / report du souci (TCC) ; « décharger par écrit » (Pennebaker)."]
];
function openParents(){
  const s=document.getElementById("psheet");s.innerHTML="";
  s.append(el("button",{class:"closex",onclick:()=>document.getElementById("parents").classList.remove("on")},"✕"));
  s.append(el("h2",null,"Pour les parents"));
  s.append(el("div",{class:"lede"},"Chaque outil vise une difficulté précise, en s'appuyant sur les forces de l'enfant plutôt que ses fragilités. À présenter comme des petits jeux — jamais comme un traitement."));
  PARENTS.forEach(([e,t,why,sci])=>s.append(el("div",{class:"pcard"},el("h4",null,e+"  "+t),el("p",null,why),el("p",{class:"sci"},"Repère : "+sci))));
  s.append(el("div",{class:"disclaimer"},"Mémoire des données : l'humeur du jour, les fiertés et le déroulé de la journée sont enregistrés uniquement dans le navigateur du téléphone (localStorage) — rien n'est envoyé sur internet, tout reste sur l'appareil. La boîte à soucis ne conserve rien, volontairement. Ces outils ne remplacent pas un suivi professionnel. Commencez par un seul, accompagnez les premiers jours, puis laissez l'autonomie. Félicitez l'effort, jamais le résultat."));
  document.getElementById("parents").classList.add("on");
}
document.getElementById("parents").addEventListener("click",e=>{if(e.target.id==="parents")e.currentTarget.classList.remove("on");});

buildHome();
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}
</script>
